<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="telegram-bot-username" content="psylkbot" />
    <title>Кабинет тренера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Telegram/мобильные WebView часто агрессивно кешируют статику.
      // Подмешиваем версию из query (?v=...), иначе — текущий timestamp.
      (function () {
        var params = new URLSearchParams(location.search || "");
        var v = params.get("v") || String(Date.now());
        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "./styles.css?v=" + encodeURIComponent(v);
        document.head.appendChild(css);
        var js = document.createElement("script");
        js.defer = true;
        js.src = "./app.js?v=" + encodeURIComponent(v);
        document.head.appendChild(js);
      })();
    </script>
  </head>
  <body>
    <div id="app" class="app" aria-live="polite"></div>
  </body>
</html>
