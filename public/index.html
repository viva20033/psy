<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="telegram-bot-username" content="psylkbot" />
    <title>Кабинет тренера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Telegram/мобильные WebView часто агрессивно кешируют статику.
      // Подмешиваем версию из query (?v=...), иначе — текущий timestamp.
      // html2canvas + jsPDF — растр PDF и отправка в Telegram (window.print() в WebView часто не работает).
      (function () {
        var params = new URLSearchParams(location.search || "");
        var v = params.get("v") || String(Date.now());
        var css = document.createElement("link");
        css.rel = "stylesheet";
        css.href = "./styles.css?v=" + encodeURIComponent(v);
        document.head.appendChild(css);
        function loadScript(src, onload) {
          var s = document.createElement("script");
          s.src = src;
          s.async = false;
          s.onload = onload;
          s.onerror = function () {
            console.warn("Не загрузился скрипт:", src);
            onload();
          };
          document.head.appendChild(s);
        }
        loadScript(
          "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",
          function () {
            loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js", function () {
              var js = document.createElement("script");
              js.defer = true;
              js.src = "./app.js?v=" + encodeURIComponent(v);
              document.head.appendChild(js);
            });
          }
        );
      })();
    </script>
  </head>
  <body>
    <div id="app" class="app" aria-live="polite"></div>
  </body>
</html>
